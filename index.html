<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>My Website</title>
    <meta name="description" content="A brief description of my website">

    <!-- Open Graph Meta Tags for Social Media -->
    <meta property="og:title" content="My Website">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://www.mywebsite.com">
    <meta property="og:image" content="https://www.mywebsite.com/og-image.jpg">
    <meta property="og:image:alt" content="Description of the image">

    <!-- Favicons -->
    <link rel="icon" href="/favicon.ico" sizes="any">
    <link rel="icon" href="/icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <link rel="manifest" href="/site.webmanifest">
    <meta name="theme-color" content="#fafafa">

    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
            text-align: center;
            background-position: bottom center;
            background-size: cover;
        }

        header,
        main,
        footer {
            width: 100%;
        }

        header h1 {
            margin: 20px 0;
        }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        footer p {
            margin: 20px 0;
        }
    </style>
</head>

<body>
<main>
    <div id="store-buttons"></div>
</main>

<footer>
    <p>&copy; 2024 Trouble Painter</p>
</footer>

<!-- JavaScript -->
<script>
    function getMobileOperatingSystem() {
        const userAgent = navigator.userAgent || navigator.vendor || window.opera;

        if (/windows phone/i.test(userAgent)) {
            return "Windows Phone";
        }

        if (/android/i.test(userAgent)) {
            return "Android";
        }

        if (/iPad|iPhone|iPod/.test(userAgent) && !window.MSStream) {
            return "iOS";
        }

        return "unknown";
    }

    function setDynamicBackground() {
        const os = getMobileOperatingSystem();
        const body = document.body;

        if (os === "Android") {
            body.style.backgroundImage = "url('background_aos.png')";
        } else if (os === "iOS") {
            body.style.backgroundImage = "url('background_ios.png')";
        } else {
            body.style.backgroundImage = "url('https://velog.velcdn.com/images/tastekim_/post/b6b927c6-22cf-43c1-b3ac-644520fdbf85/image.PNG')";
        }
    }

    function redirectToApp() {
        const appScheme = "instagram://app";
        const timeout = 500;
        const now = new Date().getTime();
        const os = getMobileOperatingSystem();

        setDynamicBackground();

        setTimeout(() => {
            if (new Date().getTime() - now < timeout + 100) {
                let appLink = '';

                if (os === "Android") {
                    appLink = 'https://play.google.com/store/apps/details?id=my.app.package';
                } else if (os === "iOS") {
                    appLink = 'https://apps.apple.com/app/id123456789';
                } else {
                    alert('Unknown OS. Please visit our site from an iOS or Android device to download the app.');
                    return;
                }

                document.body.addEventListener('click', function() {
                    window.location.href = appLink;
                });
            }
        }, timeout);

        window.location = appScheme;
    }

    document.addEventListener('DOMContentLoaded', redirectToApp);
</script>
</body>

</html>
